name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Create/enable the Pages site on first run so no manual
          # setup is needed in the repository settings.
          enablement: true
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The app is a plain static site served from the repo root.
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
